<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OilJob Assistant | Find a Job</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chat-wrapper {
      max-width: 600px;
      margin: 2rem auto;
      height: calc(100vh - 150px);
      display: flex;
      flex-direction: column;
    }
    
    .chat-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom: none;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) var(--bg-card);
    }
    
    .chat-window::-webkit-scrollbar {
      width: 6px;
    }
    .chat-window::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 3px;
    }

    .message {
      max-width: 80%;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      animation: fadeIn 0.4s ease-out forwards;
      line-height: 1.5;
    }

    .message.bot {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-color);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: var(--primary);
      color: #000;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .typing-indicator {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      align-items: center;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.4s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.6s; }

    @keyframes blink {
      0% { opacity: 0.2; transform: scale(0.8); }
      20% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.2; transform: scale(0.8); }
    }

    .chat-input-area {
      display: flex;
      gap: 1rem;
      padding: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-top: none;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      backdrop-filter: var(--glass-blur);
    }

    .chat-input {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: var(--text-main);
      font-family: var(--font-sans);
    }
    
    .chat-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .send-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: var(--primary);
      color: #000;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0,240,255,0.4);
    }

    .send-btn svg {
      margin-left: 3px;
    }

    /* Resume Preview Styles */
    .resume-preview {
      background: #fdfdfd;
      color: #333;
      padding: 1.5rem;
      border-radius: 4px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      margin-top: 0.5rem;
      font-size: 0.8rem;
      text-align: left;
      line-height: 1.4;
    }
    
    .resume-header {
      background: #1d4d7a;
      color: #fff;
      padding: 1rem;
      margin: -1.5rem -1.5rem 1.5rem -1.5rem;
      border-top-left-radius: 4px;
      border-top-right-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .resume-header h1 {
      margin: 0 0 0.3rem 0;
      font-size: 1.6rem;
      letter-spacing: 1px;
    }

    .resume-header p {
      margin: 0;
      font-size: 0.8rem;
      opacity: 0.9;
    }
    
    .resume-header-contact {
      text-align: right;
      font-size: 0.75rem;
      opacity: 0.9;
    }

    .resume-preview h3 {
      color: #1d4d7a;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 0.2rem;
      margin-top: 1.5rem;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      font-weight: 700;
    }

    .resume-preview .job-title {
      font-weight: bold;
      margin-bottom: 0.1rem;
      color: #000;
    }

    .resume-preview .job-meta {
      color: #1d4d7a;
      font-weight: 600;
      font-size: 0.75rem;
      margin-bottom: 0.4rem;
    }

    .resume-preview p {
      margin-bottom: 0.5rem;
    }

    .resume-preview ul {
      padding-left: 1.2rem;
      margin-bottom: 1rem;
      margin-top: 0;
    }

    .resume-preview li {
      margin-bottom: 0.3rem;
    }
    
    .skills-grid {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .skills-grid strong {
      color: #1d4d7a;
    }
    
    .roi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      background: #e9eff5;
      padding: 1rem;
      border-top: 2px solid #1d4d7a;
      border-bottom: 2px solid #1d4d7a;
    }
    .roi-item strong {
      display: block;
      color: #1d4d7a;
      font-size: 0.85rem;
    }
    .roi-item .value {
      font-size: 1.2rem;
      font-weight: 800;
      color: #000;
    }

    .message.bot-generated {
      max-width: 100%;
      background: transparent;
      border: none;
      padding: 0;
    }

    .resume-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .resume-actions .btn {
      flex: 1;
      text-align: center;
      padding: 0.7rem;
      font-size: 0.85rem;
      min-width: 120px;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-secondary:hover {
      background: rgba(0, 240, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="index.html" class="logo">Oil<span>Job</span></a>
    </header>

    <main class="chat-wrapper">
      <div class="chat-header animate-fade-in">
        <h2>Career Assistant</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Let's build your profile</p>
      </div>

      <div class="glass-card chat-window" id="chat-window">
        <!-- Messages injected via JS -->
      </div>
      
      <form class="chat-input-area" id="chat-form">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type your answer..." autocomplete="off">
        <button type="submit" class="send-btn" id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </main>
  </div>
  <script src="js/chatbot.js?v=2"></script>
</body>
</html>
