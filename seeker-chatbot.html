<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Assistant | OilJob</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Full Page Chat Layout */
    body {
      height: 100vh;
      overflow: hidden;
    }

    .chat-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('images/hero.png') center/cover no-repeat;
      filter: blur(40px) brightness(0.3);
      z-index: -1;
    }

    .chat-wrapper {
      max-width: 800px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }
    
    .chat-header {
      padding: 1rem 0;
      text-align: center;
    }

    .chat-header h2 {
      font-size: 2rem;
      margin-bottom: 0.25rem;
      color: var(--secondary);
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      scrollbar-width: none;
    }
    
    .chat-window::-webkit-scrollbar {
      display: none;
    }

    .message {
      max-width: 85%;
      padding: 1.25rem 1.5rem;
      border-radius: 20px;
      line-height: 1.6;
      font-size: 1.05rem;
      position: relative;
    }

    .message.bot {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      color: var(--text-main);
    }

    .message.user {
      background: var(--secondary);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .chat-input-area {
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 1.1rem;
      outline: none;
      padding: 0.5rem;
    }

    .send-btn {
      width: 50px;
      height: 50px;
      border-radius: 15px;
      background: var(--primary);
      color: #020617;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-glow);
    }

    /* Resume Preview Overrides */
    .resume-preview {
      background: white;
      color: #1a202c;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      font-family: var(--font-sans);
    }

    .resume-actions {
      margin-top: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
  </style>
</head>
<body>
  <div class="chat-bg"></div>
  
  <div class="chat-wrapper">
    <header class="header">
      <a href="index.html" class="logo">WTX<span>Connect</span></a>
      <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;">Career Assistant AI</div>
    </header>

    <div class="chat-container">
      <div class="glass-card chat-window" id="chat-window" style="background: rgba(15, 23, 42, 0.4);">
        <!-- Messages will be injected by chatbot.js -->
      </div>
    </div>
    
    <form class="chat-input-area" id="chat-form">
      <input type="text" id="chat-input" class="chat-input" placeholder="Enter your response..." autocomplete="off">
      <button type="submit" class="send-btn" id="send-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </form>
  </div>

  <script src="js/chatbot.js?v=3"></script>
</body>
</html>
